# Moon

# -90 -5.14 lunar orbital inclination,
# see https://en.wikipedia.org/wiki/Orbit_of_the_Moon#/media/File:Lunar_Orbit_and_Orientation_with_respect_to_the_Ecliptic.svg

rotX = -95.14
rotY = -5.625 # 360 / 32 (lines) * 0.5
rotZ = -6.68 # axial tilt

# light_angle_xy = 83.32
# light_angle_z = 90

#light_axis_pos_x = 0.3
#light_axis_pos_y = 0.3
#light_axis_pos_z = 3.0

colors = [[255, 255, 255]]
layer_colors = [[245, 233, 94], [255, 255, 255]]
invert_background = true

dimensions = [750, 750]

[downloader]

dem_url = "https://planetarymaps.usgs.gov/mosaic/Lunar_LRO_LOLA_Global_LDEM_118m_Mar2014.tif"
surface_color_url = "https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/lroc_color_poles.tif"

[modify_tiff]

blur = 0.8
scaling_factor = 0.25

[adjust_scene]

horizontal_width = 2.2
camera_focal_length = 50.0
light_pos_x = 0.4
light_pos_y = 0.4
light_pos_z = 3.0
light_size = 0.2
light_power = 100

[mesh]

scale = 0.08
subdivision = 10

[import_ply]

[overlay_pois]

circle_radius = 0.015
font_size = 0.020

[overlay_grid]

grid_lines_lat = 16
grid_lines_lon = 8

[overlay_axis]

axis_extent = 1.25

[process_blender]

mixture = [0.04, 0.20]

[palette]

[hatch]

blur_color_kernel_size_perc = 0.0
blur_angle_kernel_size_perc = 0.0
blur_distance_kernel_size_perc = 0.40

flowlines_line_distance = [0.6, 8.0]
flowlines_line_max_length = [20, 25]
flowlines_line_distance_end_factor = 0.5
flowlines_max_angle_discontinuity = 1.57 # pi/2

[combine]