# Mars

rotX = -90
rotY = 84.375 # 360 / 32 * 7.5  (32 lines in total, 7.5 to be in between)
rotZ = -22.5

light_mode = "implicit"

light_pos_x = 0.6
light_pos_y = -0.8
light_pos_z = 4.0

colors = [[240, 126, 50], [65, 102, 174]]
invert_background = true

dimensions = [699, 699]

[downloader]

## source: https://astrogeology.usgs.gov/search/map/mars_mgs_mola_dem_463m
#dem_url = "https://planetarymaps.usgs.gov/mosaic/Mars_MGS_MOLA_DEM_mosaic_global_463m.tif"

## source: https://hrscteam.dlr.de/public/data/globalcolor.php
#surface_color_url = "https://hrscteam.dlr.de/public/data/global_mosaic/extra/globalmosaic.rgb.tif"

# source: https://astrogeology.usgs.gov/search/map/mars_mgs_mola_mex_hrsc_blended_dem_global_200m
dem_url = "https://planetarymaps.usgs.gov/mosaic/Mars/HRSC_MOLA_Blend/Mars_HRSC_MOLA_BlendDEM_Global_200mp_v2.tif"

# source: https://astrogeology.usgs.gov/search/map/mars_viking_global_color_mosaic_925m
surface_color_url = "https://planetarymaps.usgs.gov/mosaic/Mars_Viking_ClrMosaic_global_925m.tif"

[modify_dem_stage1]

resize_width = 15000

[modify_dem_stage2]

blur = 0.25

[modify_surfacecolor]

resize_width = 10000
convert_uint8 = true

[adjust_scene]

horizontal_width = 2.4
camera_focal_length = 25.0

light_size = 0.2
light_power = 100

[mesh]

scale = 0.04
subdivision = 10

[import_ply]

[overlay_pois]

circle_radius = 0.010
double_circle_radius = 0.0085
font_size = 0.017
ignore_paths = true

[overlay_grid]

grid_lines_lat = 16
grid_lines_lon = 8

[overlay_axis]

[overlay_contours]

offset = 0.005
double_line_distance = 0.0015

[process_blender]

mixture = [0.03, 0.07]
contrast_increase = 2.0
clip_lower_percent_range = 1.0
clip_upper_percent_range = 99.0

[palette]

[hatch]

blur_color_kernel_size_perc = 0.0
blur_angle_kernel_size_perc = 0.0
blur_distance_kernel_size_perc = 0.40

flowlines_line_distance = [0.5, 6.0]
flowlines_line_min_length = 3.0
flowlines_line_max_length = [4, 30]
flowlines_line_distance_end_factor = 0.3
flowlines_max_angle_discontinuity = 0.78 # pi/4

[combine]

hatchlines_smoothing_iterations = 0
contours_smoothing_iterations = 5
